<!doctype html>
<html lang="en">
  <head>
    <!-- ===============================
       BASIC META
       =============================== -->
    <meta charset="UTF-8" />

    <!-- Mobile responsiveness -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="sitemap"
      type="application/xml"
      title="Sitemap"
      href="/sitemap.xml"
    />
    <!-- Browser compatibility -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- ===============================
       FAVICONS
       =============================== -->

    <!-- Standard favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />

    <!-- Apple devices -->
    <link rel="apple-touch-icon" href="/favicon-32x32.png" />

    <!-- Legacy browser favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- ===============================
       PRIMARY SEO META
       =============================== -->

    <!-- Title shown in Google results -->
    <title>
      LA Infra | Premium Farmland & Ethical Land Investment Near Hyderabad
    </title>

    <!-- Meta description for search engines -->
    <meta
      name="description"
      content="LA Infra develops premium farmland, estate plots, and sustainable land investment opportunities near Hyderabad. Invest in secure, transparent land assets with long-term growth potential."
    />

    <!-- Keywords (less important today but still useful) -->
    <meta
      name="keywords"
      content="farmland Hyderabad, land investment Hyderabad, farm plots Telangana, estate plots Hyderabad, LA Infra projects, agricultural land investment, nature estate land"
    />

    <!-- Search engine indexing -->
    <meta name="robots" content="index, follow" />

    <!-- Canonical URL to prevent duplicate SEO issues -->
    <link rel="canonical" href="https://thelainfra.com/" />

    <!-- ===============================
       OPEN GRAPH (Facebook / LinkedIn)
       =============================== -->

    <meta
      property="og:title"
      content="LA Infra | Premium Farmland & Ethical Land Investment Near Hyderabad"
    />

    <meta
      property="og:description"
      content="Explore premium farmland, estate land developments, and sustainable land investments near Hyderabad with LA Infra."
    />

    <meta property="og:type" content="website" />

    <meta property="og:url" content="https://thelainfra.com/" />

    <!-- Replace with real preview image later -->
    <meta property="og:image" content="https://thelainfra.com/og-image.jpg" />

    <!-- ===============================
       TWITTER CARD SEO
       =============================== -->

    <meta name="twitter:card" content="summary_large_image" />

    <meta
      name="twitter:title"
      content="LA Infra | Premium Farmland Investments Near Hyderabad"
    />

    <meta
      name="twitter:description"
      content="Invest in sustainable farmland and estate land developments near Hyderabad with LA Infra."
    />

    <meta name="twitter:image" content="https://thelainfra.com/og-image.jpg" />

    <!-- ===============================
       PERFORMANCE OPTIMIZATION
       =============================== -->

    <!-- Preload hero image (improves LCP) -->
    <link
      rel="preload"
      as="image"
      href="/assets/images/hero/hero-farmland.webp"
      fetchpriority="high"
    />
    <link rel="preconnect" href="https://www.transparenttextures.com" />
    <!-- Preconnect to Google font servers -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preload main fonts -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap"
    />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- ===============================
       STRUCTURED DATA (GOOGLE SEO)
       Helps Google understand your business
       =============================== -->

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "RealEstateAgent",
        "name": "LA Infra",
        "url": "https://thelainfra.com",
        "logo": "https://thelainfra.com/logo.jpg",
        "description": "Premium farmland and sustainable land investment opportunities near Hyderabad.",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Hyderabad",
          "addressRegion": "Telangana",
          "addressCountry": "India"
        }
      }
    </script>
  </head>

  <body class="bg-cream text-forest antialiased">
    <!-- ===============================
       REACT ROOT
       =============================== -->
    <div id="root"></div>

    <!-- ===============================
       MAIN REACT ENTRY FILE
       Defer loading for performance
       =============================== -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
